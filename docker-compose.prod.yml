# Production compose — builds a single optimised image that serves the API
# and compiled frontend static files together.
#
# Usage:
#   docker compose -f docker-compose.prod.yml build
#   docker compose -f docker-compose.prod.yml up -d
#
# Required env vars (set in shell or a .env file):
#   DATABASE_URL, OLLAMA_BASE_URL, OLLAMA_MODEL, POSTGRES_PASSWORD

services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: specter-app
    restart: unless-stopped
    environment:
      API_PORT: ${API_PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/specter}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:12b}
      CONTRACT_OUTPUT_DIR: /app/contracts
      NODE_ENV: production
    ports:
      - "${API_PORT:-4000}:${API_PORT:-4000}"
    volumes:
      - specter_contracts_data:/app/contracts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${API_PORT:-4000}/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: specter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-specter}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in production}
    volumes:
      - specter_postgres_data:/var/lib/postgresql/data
    # Not exposed on host in production — only accessible within Docker network
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-specter}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  specter_postgres_data:
  specter_contracts_data:
