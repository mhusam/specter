# Development compose — hot-reload via volume mounts.
# Run: docker compose up -d
# Ollama must be running on your host machine.

services:
  api:
    image: node:22-alpine
    container_name: specter-api
    working_dir: /app
    command: >
      sh -c "corepack enable &&
             pnpm install --prefer-offline 2>/dev/null || pnpm install &&
             node server/index.js"
    environment:
      API_PORT: ${API_PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/specter}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:12b}
      CONTRACT_OUTPUT_DIR: /app/contracts
      NODE_ENV: development
    ports:
      - "${API_PORT:-4000}:${API_PORT:-4000}"
    volumes:
      - ./app:/app
      - specter_api_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${API_PORT:-4000}/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: node:22-alpine
    container_name: specter-frontend
    working_dir: /app
    command: >
      sh -c "corepack enable &&
             pnpm install --prefer-offline 2>/dev/null || pnpm install &&
             pnpm run dev"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
      NODE_ENV: development
    ports:
      - "5173:5173"
    volumes:
      - ./app:/app
      - specter_frontend_node_modules:/app/node_modules
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: specter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-specter}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - specter_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-specter}"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: specter-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:8080"

volumes:
  specter_postgres_data:
  specter_api_node_modules:
  specter_frontend_node_modules:
